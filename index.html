<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="style.css">

  <title>Puzzle with Charlie the dog!</title>

</head>
<body>

<h1>Puzzle with Charlie the dog!</h1>


<div class="game-container">

  <!--In my visual plan, I had the board (where people drag the pieces into the board) visually similar to the one I have represented right now. Since I do think this is more for 
the audience of children (just a small short game with my dog, Charlie) I decided to make the pieces go 2x2. I don't really know how I can cut the pieces like I did in the visual plan,
but again, since this is aimed towards children, I think it would be easier if the pieces were cropped as squares. -->


  <div id="board">
    <div class="slot" data-piece="0"></div>
    <div class="slot" data-piece="1"></div>
    <div class="slot" data-piece="2"></div>
    <div class="slot" data-piece="3"></div>
  </div>

<!-- I got the help of -->

  <div id="tray"></div>

  <!-- To put all my puzzle pieces into the right area like I visually-->

</div>

<div id="piece-layer"></div>

<div id="complete-screen">
  <div class="card">
    <h2>All Puzzles Complete!</h2>
    <p>Great job!</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
