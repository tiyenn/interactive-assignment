<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle with Charlie!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Puzzle with Charlie!</h1>


<div class="game-container">

  <div id="board">
    <div class="slot" data-piece="0"></div>
    <div class="slot" data-piece="1"></div>
    <div class="slot" data-piece="2"></div>
    <div class="slot" data-piece="3"></div>
  </div>

  <div id="tray"></div>

</div>

<div id="piece-layer"></div>

<div id="complete-screen">
  <div class="card">
    <h2>All Puzzles Complete!</h2>
    <p>Great job!</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
